name: Publish Release

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  release:
    if: github.event.pull_request.merged == true && startsWith(github.head_ref, 'release/')
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Resolve version from branch name
        id: version
        run: |
          VERSION="${GITHUB_HEAD_REF#release/}"

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Branch name 'release/${VERSION}' doesn't look like a stable version (expected e.g. release/1.2.3)"
            exit 1
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Version: $VERSION"

      - name: Download XCFramework from Core release
        env:
          GH_TOKEN: ${{ secrets.CORE_REPO_PAT }}
          VERSION: ${{ steps.version.outputs.version }}
          CORE_REPO: ${{ secrets.CORE_REPO_SLUG }}
        run: |
          gh release download "$VERSION" \
            --repo "$CORE_REPO" \
            --pattern "AdtelligentSwiftSDK.xcframework.zip"

      - name: Extract public release notes
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          echo "$PR_BODY" > /tmp/pr-body.md
          awk '/<!-- adtelligent-release-notes-start -->/{flag=1; next} /<!-- adtelligent-release-notes-end -->/{flag=0} flag' /tmp/pr-body.md > /tmp/release-notes.md
          echo "📝 Extracted release notes:"
          cat /tmp/release-notes.md

      - name: Create wrapper release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          target_commitish: ${{ github.event.pull_request.merge_commit_sha }}
          files: AdtelligentSwiftSDK.xcframework.zip
          body_path: /tmp/release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
